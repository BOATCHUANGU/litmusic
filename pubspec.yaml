name: litmusic
description: "A local music player app - BoatMusic."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  audioplayers: ^6.1.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  uuid: ^4.3.3
  path: ^1.9.0
  shared_preferences: ^2.3.4
  flutter_inappwebview: ^6.1.5
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
